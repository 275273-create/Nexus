<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Itens Perdidos</title>
</head>
<body>
    <header>
        <div id="logo">
            <img src="logo.png" alt="Logo Achados e Perdidos">
        </div>

        <nav id="cabecalho">
            <ul>
                <li class="nav_cabecalho"><a href="index.html" class="ancora_cabecalho">Início</a></li>
                <li class="nav_cabecalho"><a href="itens.html" class="ancora_cabecalho">Itens</a></li>
                <li class="nav_cabecalho"><a href="cadastrar.html" class="ancora_cabecalho">Cadastrar</a></li>
                <li class="nav_cabecalho"><a href="sobre.html" class="ancora_cabecalho">Sobre</a></li>
            </ul>
        </nav>

        <button id="botao_cabecalho">Entrar</button>
    </header>

    <main>
        <section>
            <h1>Itens Cadastrados</h1>
            <p>Abaixo estão os objetos que já foram registrados e aprovados pelo responsável.</p>
        </section>

        <section>
            <div class="navegacao_itens">
            <nav>
                <button class="navegacao_itens"><a href="#">Todos</a></button>
                <button class="navegacao_itens"><a href="#">Achados</a></button>
                <button class="navegacao_itens"><a href="#">Perdidos</a></button>
            </nav>
            </div>

            <div class="container_itens">
                <ul class="container_cards">
                    <li class="item_card">
                        <article class="card">
                            <div class="header_card">
                                <h3 class="titulo_item">Celular</h3>
                                <p class="local_item">Bloco 1</p>
                                <p class="data_item">25/03/2026</p>
                                <p class="situacao_item">Achado</p>
                            </div>

                            <div  class="body_cards">
                                <img src="img/celular.png" alt="Celular" class="img_card">
                            </div>

                            <div class="footer_cards">
                                <button class="btn_contato"><a href="#">Entrar em contato</a></button>
                            </div>
                        </article>
                    </li>
                </ul>
            </div>

            
        </section>

        <section class="footer_main">
            <button><a href="cadastrar.html">Cadastrar itens +</a></button>
            <button><a href="index.html">Voltar para o início</a></button>
        </section>
    </main>

</html>
